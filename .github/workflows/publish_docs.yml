name: Publish Docs

on: workflow_dispatch

permissions: write-all

jobs:
  deployment:

    runs-on: ubuntu-latest
    if: github.repository == 'SMILEY4/ktor-openapi-tools'

    steps:

      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Python
        uses: actions/cache@v4
        env:
          cache-name: "cache-python"
        with:
          path: '.gradle/python'
          key: 'python'

      - name: Dokka
        run: ./gradlew dokkaGenerateHtml -Dorg.gradle.jvmargs=-XX:MaxMetaspaceSize=512m

      - name: Publish
        run: ./gradlew mkdocsPublish -Porg.ajoberstar.grgit.auth.username=${{ secrets.GRGIT_USER }}