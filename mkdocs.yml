# Project Information
# https://www.mkdocs.org/user-guide/configuration/#project-information
site_name: Ktor OpenAPI Tools
site_url: https://smiley4.github.io/ktor-openapi-tools/
site_description: A collection of libraries to simplify API documentation and exploration for Ktor applications. Generates OpenAPI specifications and provides Swagger UI and ReDoc.

# Repository
repo_name: ktor-openapi-tools
repo_url: https://github.com/SMILEY4/ktor-openapi-tools


# Documentation Layout
# https://www.mkdocs.org/user-guide/configuration/#documentation-layout
nav:
    -   Home: index.md
    -   OpenAPI:
            -   Getting Started: openapi/getting_started.md
            -   Plugin Configuration: openapi/plugin_configuration.md
            -   Providing OpenAPI Specification: openapi/providing_openapi_specification.md
            -   Documenting Routes:
                    -   Basic Route Documentation: openapi/documenting_routes/basic_route_documentation.md
                    -   Request Documentation: openapi/documenting_routes/request_documentation.md
                    -   Response Documentation: openapi/documenting_routes/response_documentation.md
                    -   Nested Routes and Documentation Inheritance: openapi/documenting_routes/nested_routes_and_documentation_inheritance.md
            -   Working With Schemas:
                    -   Introduction To Schemas: openapi/working_with_schemas/schema_introduction.md
                    -   Manual Schema Definition: openapi/working_with_schemas/manual_schema_definition.md
                    -   Automatic Schema Generation: openapi/working_with_schemas/automatic_schema_generation_overview.md
                    -   Customizing Automatically Generated Schemas: openapi/working_with_schemas/customizing_automatically_generated_schemas.md
                    -   Global Schemas: openapi/working_with_schemas/global_schemas.md
            -   Working With Examples:
                    -   Introduction To Examples: openapi/working_with_examples/examples_introduction.md
                    -   Global Examples: openapi/working_with_examples/global_examples.md
                    -   Configuring Example Encoding: openapi/working_with_examples/configuring_example_encoding.md
            - Advanced Topics:
                  - Multiple API Specifications: openapi/advanced_topics/multiple_openapi_specifications.md
                  - Typesafe Routing Support: openapi/advanced_topics/typesafe_routing_support.md
                  - Documenting Webhooks: openapi/advanced_topics/documenting_webhooks.md
                  - Documenting Server-Sent Events: openapi/advanced_topics/documenting_sse_routes.md
            -   Troubleshooting & FAQ: openapi/troubleshooting_and_faq.md
            -   API Reference: dokka/ktor-openapi/index.html
    -   Swagger UI:
            - swaggerui/index.md
            -   Getting Started: swaggerui/getting_started.md
            -   API Reference: dokka/ktor-swagger-ui/index.html
    -   ReDoc:
            - redoc/index.md
            -   Getting Started: redoc/getting_started.md
            -   API Reference: dokka/ktor-redoc/index.html
    -   Examples:
            - examples/index.md
            -   Basics: examples/basics.md
            -   Requests and Responses: examples/request-response.md
            -   Authentication: examples/authentication.md
            -   File Upload: examples/file-upload.md
            -   Webhooks: examples/webhooks.md
            -   Schema Handling: examples/schemas.md
            -   Schema Generator: examples/customized-schema-generator.md
            -   Example Handling: examples/openapi-examples.md
            -   Kotlinx Serialization: examples/kotlinx-serialization.md
            -   Petstore: examples/petstore.md
            -   Multiple Specs: examples/multiple-specs.md
            -   External OpenAPI Spec: examples/external-openapi-spec.md
            -   Complete Configuration: examples/complete-configuration.md
    -   Changelog: changelog.md


# Validation
# # https://www.mkdocs.org/user-guide/configuration/#validation
validation:
    nav:
        omitted_files: warn
        not_found: warn
        absolute_links: warn
    links:
        not_found: warn
        absolute_links: warn
        unrecognized_links: warn


# Configuration
# https://www.mkdocs.org/user-guide/configuration/#build-directories
theme:
    name: material
    icon:
        logo: material/library
        repo: fontawesome/brands/github
    palette:
        -   media: "(prefers-color-scheme)"
            toggle:
                icon: material/brightness-auto
                name: Switch to light mode
        -   media: "(prefers-color-scheme: light)"
            scheme: default
            toggle:
                icon: material/brightness-7
                name: Switch to dark mode
        -   media: "(prefers-color-scheme: dark)"
            scheme: slate
            toggle:
                icon: material/brightness-4
                name: Switch to system preference
    features:
        - navigation.tracking
        - navigation.tabs
        - navigation.tabs.sticky
        - navigation.indexes
        - search.suggest
        - search.share
        - content.code.copy
        - content.code.annotate
extra_css:
    - assets/stylesheets/extra.css
extra:
    version:
        provider: mike
plugins:
    - search
    - privacy


# Formatting Options
# https://www.mkdocs.org/user-guide/configuration/#formatting-options
markdown_extensions:
    # https://python-markdown.github.io/extensions/
    - attr_list
    - admonition
    - md_in_html
    - tables
    # https://facelessuser.github.io/pymdown-extensions/extensions/arithmatex/
    -   pymdownx.betterem:
            smart_enable: all
    - pymdownx.details
    -   pymdownx.snippets:
            base_path: [ 'examples/src/main/kotlin/io/github/smiley4/ktoropenapi/examples' ]
            dedent_subsections: True
    - pymdownx.superfences
    -   pymdownx.tabbed:
            alternate_style: true
    -   pymdownx.emoji:
            emoji_index: !!python/name:material.extensions.emoji.twemoji
            emoji_generator: !!python/name:material.extensions.emoji.to_svg
            options:
                custom_icons:
                    - './docs/assets/icons'